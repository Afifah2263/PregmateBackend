{% extends 'layouts/layout.html' %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/datauser.css') }}">
{% endblock %}

{% block content %}
  <div class="container">
    <header class="form-header">
      <h1>Edit User</h1>
      <a href="{{ url_for('datauser.users') }}" class="btn btn-back">Back to User List</a>
    </header>

    <section class="form-section">
      <form action="{{ url_for('datauser.user_edit', id=user._id) }}" method="POST" enctype="multipart/form-data" class="user-form">
        
        <!-- Nama -->
        <div class="form-group">
          <label for="nama" class="form-label">Nama:</label>
          <input type="text" name="nama" id="nama" value="{{ user.nama }}" required class="form-input" placeholder="Enter your name">
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email:</label>
          <input type="email" name="email" id="email" value="{{ user.email }}" required class="form-input" placeholder="Enter your email">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">Password:</label>
          <input type="password" name="password" id="password" value="{{ user.password }}" required class="form-input" placeholder="Enter your password">
        </div>

        <!-- Foto Upload -->
        <div class="form-group">
          <label for="foto" class="form-label">Foto (Upload Image):</label>
          
          <!-- Menampilkan foto saat ini -->
          {% if user.foto %}
            <div class="current-photo">
              <img src="{{ url_for('static', filename='images/' + user.foto) }}" alt="Current User Photo" class="img-preview">
              <p>Current Photo</p>
            </div>
          {% endif %}
          
          <!-- Input untuk upload foto -->
          <input type="file" name="foto" id="foto" accept="image/*" class="form-input">
        </div>

        <!-- Submit Button -->
        <div class="form-group">
          <button type="submit" class="btn btn-submit">Update User</button>
        </div>

      </form>
    </section>
  </div>
{% endblock %}
