<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Registrasi Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }
        .register-container {
            background: white;
            padding: 35px 45px;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(38, 50, 56, 0.3);
            width: 360px;
            text-align: center;
            color: #333;
            position: relative;
            overflow: hidden;
        }
        .register-container::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            opacity: 0.15;
            transform: rotate(25deg);
            pointer-events: none;
            z-index: 0;
        }
        h2 {
            margin-bottom: 30px;
            font-weight: 700;
            color: #2575fc;
            position: relative;
            z-index: 1;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 22px;
            border: 2px solid #2575fc;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
            z-index: 1;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #ee0979;
            box-shadow: 0 0 8px rgba(238, 9, 121, 0.6);
        }
        button {
            width: 100%;
            background: linear-gradient(90deg, #ff6a00 0%, #ee0979 100%);
            border: none;
            color: white;
            padding: 14px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }
        button:hover {
            background: linear-gradient(90deg, #ee0979 0%, #ff6a00 100%);
            box-shadow: 0 4px 15px rgba(238, 9, 121, 0.7);
        }
        p.login-link {
            margin-top: 18px;
            color: #666;
            position: relative;
            z-index: 1;
        }
        p.login-link a {
            color: #2575fc;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
            position: relative;
            z-index: 1;
        }
        p.login-link a:hover {
            color: #ee0979;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Registrasi Admin</h2>
        <form method="POST" action="/admin/register" class="register-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />

            <label for="confirm_password">Konfirmasi Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required />

            <button type="submit">Register</button>
        </form>

        <p class="login-link">
            Sudah punya akun? <a href="/admin/login">Login di sini</a>
        </p>
    </div>
</body>
</html>
