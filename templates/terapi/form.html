{% extends 'layouts/layout.html' %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/terapi.css') }}">
{% endblock %}

{% block content %}
  <div class="form-container">
    <h1 class="form-title">{{ action }} Terapi</h1>
    <form method="POST" enctype="multipart/form-data" class="terapi-form">
      
      <label for="nama"><i class="fas fa-signature icon-label"></i>Nama Terapi:</label>
      <input type="text" name="nama" id="nama" value="{{ terapi.nama if terapi else '' }}" required>

      <label for="deskripsi"><i class="fas fa-align-left icon-label"></i>Deskripsi:</label>
      <textarea name="deskripsi" id="deskripsi">{{ terapi.deskripsi if terapi else '' }}</textarea>

      <label for="video_url"><i class="fas fa-video icon-label"></i>URL Video:</label>
      <input type="url" name="video_url" id="video_url" value="{{ terapi.video_url if terapi else '' }}" required>

      <label for="gambar"><i class="fas fa-image icon-label"></i>Upload Gambar (.jpg/.png):</label>
      <input type="file" name="gambar" id="gambar" accept=".jpg,.jpeg,.png" {% if not terapi %} required {% endif %}>

      <label for="model_id"><i class="fas fa-cube icon-label"></i>Model ID:</label>
      <input type="text" name="model_id" id="model_id" value="{{ terapi.model_id if terapi else '' }}" required>

      <label for="landmark_referensi_id"><i class="fas fa-map-marker-alt icon-label"></i>Landmark Referensi ID:</label>
      <input type="text" name="landmark_referensi_id" id="landmark_referensi_id" value="{{ terapi.landmark_referensi_id if terapi else '' }}" required>

      <label for="peringatan"><i class="fas fa-exclamation-triangle icon-label"></i>Peringatan:</label>
      <input type="text" name="peringatan" id="peringatan" value="{{ terapi.peringatan if terapi else '' }}">

      <div class="form-actions">
        <button type="submit" class="btn-submit">{{ action }}</button>
        <a href="{{ url_for('terapi.index_terapi') }}" class="btn-cancel">Batal</a>
      </div>
    </form>
  </div>
{% endblock %}
