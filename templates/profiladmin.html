{% extends 'layouts/layout.html' %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/profiladmin.css') }}">
{% endblock %}

{% block content %}
  <div class="container">
    <h2>Profil Admin</h2>
    <form method="POST" action="{{ url_for('admin_bp.profile') }}" enctype="multipart/form-data">
      <!-- Foto Profil -->
      <label for="photo">Foto Profil:</label>
      <img 
        src="{{ url_for('static', filename='uploads/' + admin.photo) if admin.photo else url_for('static', filename='default-profile.png') }}" 
        alt="Foto Profil" 
        class="profile-photo" 
        id="profilePreview"
      >
      <input type="file" id="photo" name="photo" accept="image/*" onchange="previewPhoto(event)">

      <label for="username">Username (Email):</label>
      <input type="text" id="username" name="username" value="{{ admin.username }}" readonly>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" placeholder="Masukkan password baru jika ingin ganti">

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" value="{{ admin.email }}">

      <label for="name">Nama Lengkap:</label>
      <input type="text" id="name" name="name" value="{{ admin.name }}">

      <label for="phone">Nomor Telepon:</label>
      <input type="tel" id="phone" name="phone" value="{{ admin.phone }}">

      <label for="address">Alamat:</label>
      <textarea id="address" name="address" rows="3">{{ admin.address }}</textarea>

      <button type="submit">Update Profil</button>
    </form>
  </div>

  <script>
    function previewPhoto(event) {
      const reader = new FileReader();
      reader.onload = function(){
        const output = document.getElementById('profilePreview');
        output.src = reader.result;
      }
      reader.readAsDataURL(event.target.files[0]);
    }
  </script>
{% endblock %}
